# Netlify configuration for the archive.

[build]
  # The site is fully static — nothing to build.
  publish = "."
  functions = "netlify/functions"

# thoughts.json must never be served stale: the feed should update
# as soon as a new deploy goes live.
[[headers]]
  for = "/thoughts.json"
  [headers.values]
    Cache-Control = "no-cache"

# Images are content-addressed by entry id and never change once
# committed, so they may be cached forever.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
